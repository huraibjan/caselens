version: "3.9"

services:
  # ── PostgreSQL with pgvector ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: caselens-postgres
    environment:
      POSTGRES_DB: caselens
      POSTGRES_USER: caselens
      POSTGRES_PASSWORD: caselens_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caselens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: caselens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: caselens-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Temporal (Workflow Engine) ───────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: caselens-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=caselens
      - POSTGRES_PWD=caselens_dev_password
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: caselens-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

volumes:
  postgres_data:
  redis_data:
  minio_data:
